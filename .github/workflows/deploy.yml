name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Flexible mode: users can choose WebLLM (local) or enter their own API endpoint/key
      # No SINGLE_MODE lock, no API key baked in, API panel visible
      INJECT_API_CONFIG: 'true'
      API_INJECT_TARGET: 'define'
      API_BASE_URL: ''
      API_KEY: ''
      API_MODEL: ''
      API_HIDE_API_PANEL: ''

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build WebLLM Components
      run: |
        cd webllm-components
        export HUSKY=0
        export HUSKY_SKIP_HOOKS=1
        sed -i 's/\r$//' cleanup-index-js.sh
        npm ci --ignore-scripts
        chmod +x cleanup-index-js.sh
        chmod +x node_modules/.bin/rollup
        export PATH="$PATH:$(npm bin)"
        npm run build
        test -f lib/index.js

    - name: Build OPTLite Components
      run: |
        cd optlite-components
        npm ci
        chmod +x node_modules/.bin/webpack
        npm run build:prod
        test -f build/index.html
        test -f build/live.html

    - name: Copy static files to build
      run: |
        cd optlite-components
        cp js/pyodide/instrument.js build/
        cp js/pyodide/opt_trace.h build/
        cp sw.js build/

    - name: Verify build output
      run: |
        cd optlite-components
        echo "Build directory contents:"
        ls -la build/
        echo "Total files:"
        find build/ -type f | wc -l

    - name: Fetch xeus-cpp WASM runtime
      run: |
        mkdir -p optlite-components/build/xeus-cpp
        cd optlite-components/build/xeus-cpp
        # xeus-cpp 0.10.0 (clang 21.1.8, C++23, emscripten-forge-4x)
        curl -fsSL "https://prefix.dev/emscripten-forge-4x/emscripten-wasm32/xeus-cpp-0.10.0-h0b0027f_0.tar.bz2" -o xcpp.tar.bz2
        tar xf xcpp.tar.bz2
        # Find and copy xcpp.js, xcpp.wasm, xcpp.data to the current dir
        find . -name "xcpp.js" -exec cp {} . \;
        find . -name "xcpp.wasm" -exec cp {} . \;
        find . -name "xcpp.data" -exec cp {} . \;
        rm -rf bin xcpp.tar.bz2
        # CppInterOp 1.9.0 — provides libclangCppInterOp.so (WASM side module)
        curl -fsSL "https://prefix.dev/emscripten-forge-4x/emscripten-wasm32/cppinterop-1.9.0-h0b0027f_0.tar.bz2" -o cppinterop.tar.bz2
        tar xf cppinterop.tar.bz2 lib/libclangCppInterOp.so lib/libclangCppInterOp.so.21.1
        cp -L lib/libclangCppInterOp.so .
        rm -rf lib cppinterop.tar.bz2
        # xeus 6.0.5 — provides libxeus.so (required by xcpp.wasm)
        curl -fsSL "https://prefix.dev/emscripten-forge-4x/emscripten-wasm32/xeus-6.0.5-h0b0027f_0.tar.bz2" -o xeus.tar.bz2
        tar xf xeus.tar.bz2 lib/libxeus.so
        cp -L lib/libxeus.so .
        rm -rf lib xeus.tar.bz2
        echo "xeus-cpp files:"
        ls -la

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: opt-cpp-build-${{ github.run_number }}
        path: optlite-components/build/
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: opt-cpp-build-${{ github.run_number }}
          path: optlite-components/build

      - name: Create .nojekyll
        run: touch optlite-components/build/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: optlite-components/build
          publish_branch: gh-pages
