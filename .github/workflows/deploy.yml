name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SINGLE_MODE: 'local'
      INJECT_API_CONFIG: 'true'
      API_INJECT_TARGET: 'define'
      API_BASE_URL: 'https://dive.cs.cityu.edu.hk/ai-test/v1'
      API_KEY: 'apikey123456'
      API_MODEL: 'test'
      API_HIDE_API_PANEL: ''

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build WebLLM Components
      run: |
        cd webllm-components
        export HUSKY=0
        export HUSKY_SKIP_HOOKS=1
        sed -i 's/\r$//' cleanup-index-js.sh
        npm ci --ignore-scripts
        chmod +x cleanup-index-js.sh
        chmod +x node_modules/.bin/rollup
        export PATH="$PATH:$(npm bin)"
        npm run build
        test -f lib/index.js

    - name: Build OPTLite Components
      run: |
        cd optlite-components
        npm ci
        chmod +x node_modules/.bin/webpack
        npm run build:prod
        test -f build/index.html
        test -f build/live.html

    - name: Verify build output
      run: |
        cd optlite-components
        echo "Build directory contents:"
        ls -la build/
        echo "Total files:"
        find build/ -type f | wc -l

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: opt-cpp-build-${{ github.run_number }}
        path: optlite-components/build/
        retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: opt-cpp-build-${{ github.run_number }}
          path: optlite-components/build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: optlite-components/build
          publish_branch: gh-pages
