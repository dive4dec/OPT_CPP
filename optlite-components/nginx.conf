server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # COOP/COEP/CORP headers — required for SharedArrayBuffer (xeus-cpp WASM)
    # COEP: credentialless allows WebLLM to fetch cross-origin model files
    # (e.g., from Hugging Face CDN) without requiring CORP headers from those
    # servers. Still enables SharedArrayBuffer.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # SPA fallback (but NOT for /xeus-cpp/ — missing WASM files should 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # xeus-cpp WASM files — return 404 for missing files, not index.html
    location /xeus-cpp/ {
        try_files $uri $uri/ =404;
    }

    # AI reverse proxy — forwards /ai-proxy/ to the real API with key injected.
    # The browser never sees the API key; it only calls same-origin /ai-proxy/.
    # Set API_PROXY_TARGET and API_PROXY_KEY as env vars at container start.
    location /ai-proxy/ {
        resolver 10.96.0.1 valid=300s;  # kube-dns
        proxy_pass ${API_PROXY_TARGET}/;
        proxy_set_header Host $proxy_host;
        proxy_set_header Authorization "Bearer ${API_PROXY_KEY}";
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Accept $http_accept;
        proxy_buffering off;            # SSE streaming
        proxy_read_timeout 120s;
        proxy_cache off;
    }

    # Favicon — return 204 to avoid 404 noise
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|whl|wasm|data|h)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        # Must repeat COOP/COEP/CORP for asset responses (nginx add_header quirk)
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }
}
