server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # COOP/COEP/CORP headers — required for SharedArrayBuffer (xeus-cpp WASM)
    # Under COEP: require-corp, every resource must also have CORP: same-origin
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # SPA fallback (but NOT for /xeus-cpp/ — missing WASM files should 404)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # xeus-cpp WASM files — return 404 for missing files, not index.html
    location /xeus-cpp/ {
        try_files $uri $uri/ =404;
    }

    # Favicon — return 204 to avoid 404 noise
    location = /favicon.ico {
        return 204;
        access_log off;
        log_not_found off;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|whl|wasm|data)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        # Must repeat COOP/COEP/CORP for asset responses (nginx add_header quirk)
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }
}
